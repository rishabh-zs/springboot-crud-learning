
name: Spring Boot Demo App Workflow
run-name: ${{ github.actor }} is deploying to AWS 🚀

on:
  push:
    branches:
      - main

jobs:
  # JOB 1: Build the code and package the files
  Build-Spring-Boot-App:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      # Temporarily save the necessary files for the deployment job
      - name: Upload Deployment Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-files
          path: |
            build/libs/*.jar
            Dockerfile
            docker-compose.yml

  # JOB 2: Deploy to AWS EC2
  Deploy-To-EC2:
    needs: Build-Spring-Boot-App # Wait for the build to succeed first!
    runs-on: ubuntu-latest
    steps:
      - name: Download Deployment Artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-files
          path: ./deploy

      # Securely copy files to the EC2 server
      - name: Copy files to EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/*"
          target: "~/app"
          strip_components: 1

      # Connect to the server, install Docker, and start the app
      - name: SSH into EC2 and Run Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Install Docker and Docker Compose if they aren't installed yet
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi
            
            # 2. Navigate to the app directory we copied the files to
            cd ~/app
            
            # 3. Shut down the old container and start the new one
            sudo docker-compose down
            sudo docker-compose up -d --build
