spring.application.name=springboot-crud-learning

# Import the custom db.properties file
spring.config.import=classpath:db.properties

# Map custom properties to Spring Datasource properties
spring.datasource.url=${db.url}
spring.datasource.username=${db.username}
spring.datasource.password=${db.password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Enable Hibernate DDL for JPA entity-backed schema management
spring.jpa.hibernate.ddl-auto=update

# Enable SQL logging to see database queries
spring.jpa.show-sql=true
logging.level.com.zs.practice1=DEBUG

management.observations.enabled=true
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
# Local default points to localhost; Docker overrides this with ZIPKIN_ENDPOINT.
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# VERY IMPORTANT (to SEE traceId in logs)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Application Port
server.port=8080

# JWT Configuration
jwt.secret=${JWT_SECRET:lPnJb8bzMM50MBco36Mp7ZSZHOpis+tZ6pwOoXdMf60=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}